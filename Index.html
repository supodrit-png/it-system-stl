<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการอุปกรณ์ IT STL</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #f4f7f6; 
        }
        .wrapper {
            position: absolute;
            /* ดันแถบสีเทาขึ้นไปซ่อนด้านบน 65 พิกเซล */
            top: -65px; 
            left: 0;
            width: 100%;
            /* เพิ่มความสูงชดเชยส่วนที่หายไป */
            height: calc(100% + 65px); 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbzM4AYZ8QJ9URgfSkndm4w0rYILEX1_ZTNSf4kXjbru7-Vu2NiL0kN7Oyzokz-RxoBj/exec"></iframe>
    </div>
</body>
</html>
